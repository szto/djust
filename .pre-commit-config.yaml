# Pre-commit hooks for djust
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Python - Ruff for linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      # Linter
      - id: ruff
        args: [--fix]
        files: ^(python/|tests/)
      # Formatter
      - id: ruff-format
        files: ^(python/|tests/)

  # Rust - Formatting and linting
  - repo: local
    hooks:
      # Rust formatting
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false
        args: [--all, --check]

      # Rust linting (clippy)
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy
        language: system
        types: [rust]
        pass_filenames: false
        args: [--all-targets, --all-features, --, -D, warnings]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.min\.js(\.map)?$|\.pxd$'
      - id: end-of-file-fixer
        exclude: '\.min\.js(\.map)?$|\.pxd$'
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-toml
      # `.pxd` excluded: Pixelmator logo files in python/djust/ are
      # actually binary ZIP archives that `identify` (pre-commit's
      # text-detection lib) misclassifies as text on the `.pxd`
      # extension. Without this exclude, the hook auto-"fixes" CR
      # bytes inside the binary payload and corrupts the asset (#1215).
      - id: mixed-line-ending
        exclude: '\.pxd$'

  # Security - Python security linter
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        # Skip expected patterns in this codebase:
        # B703/B308: mark_safe - expected in templates
        # B324: MD5 - used for non-security cache keys
        # B301: pickle - used for JIT function caching
        # B102: exec - used for JIT code generation
        args: ["-ll", "-ii", "-x", "tests/,python/tests/,python/djust/tests/", "-s", "B703,B308,B324,B301,B102"]
        files: ^python/

  # JavaScript - Build, test, and lint
  - repo: local
    hooks:
      - id: check-bundle-init-order
        name: bundle init-order static lint (#1372)
        entry: node scripts/check-bundle-init-order.mjs
        language: system
        files: ^python/djust/static/djust/src/
        types: [javascript]
        pass_filenames: false

      - id: check-cross-iife-refs
        name: bundle cross-IIFE bare-reference static guard (#1706)
        entry: node scripts/check-cross-iife-refs.mjs
        language: system
        files: ^python/djust/static/djust/src/
        types: [javascript]
        pass_filenames: false

      - id: build-js
        name: build client.js from src/ modules
        entry: bash -c 'bash scripts/build-client.sh && git add python/djust/static/djust/client.js python/djust/static/djust/debug-panel.js'
        language: system
        files: ^python/djust/static/djust/src/
        types: [javascript]
        pass_filenames: false

      - id: npm-test
        name: npm test
        entry: npm test
        language: system
        types: [javascript]
        pass_filenames: false

      - id: eslint
        name: eslint
        # Gate on errors (severity 2) AND warnings (severity 1). After #1719
        # drove the project-wide warning count to 0 (each remaining
        # security/detect-object-injection site carries a justified
        # eslint-disable comment), --max-warnings 0 re-introduces a ceiling
        # so the count can only go down — any new warning blocks the commit,
        # alongside the real XSS/no-script-url error gates.
        entry: npx eslint --no-warn-ignored --max-warnings 0
        language: system
        files: ^python/djust/static/djust/[^/]*\.js$
        pass_filenames: true

  # Python - mypy type-checking (lenient global + strict islands; ADR-023)
  # Scoped to python/djust source changes. The config (pyproject [tool.mypy])
  # makes the gate GREEN against the legacy baseline while enforcing strict
  # rules on the strict-island modules (security/*, rate_limit, validation,
  # permissions, the _rust.pyi boundary, etc.). Runs the full package because
  # mypy needs cross-module context; warm runs are ~0.3s thanks to the cache.
  - repo: local
    hooks:
      - id: mypy
        name: mypy type-check (ADR-023 strict islands)
        entry: bash -c 'bash scripts/run-with-venv-python.sh -m mypy python/djust'
        language: system
        files: ^python/djust/.*\.pyi?$
        pass_filenames: false

  # Security - Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock\.json

  # CHANGELOG validation — catches drift between claimed test counts and
  # actual tests in referenced files. See scripts/check-changelog-test-counts.py
  # and tests/test_changelog_test_counts.py. Closes #908.
  - repo: local
    hooks:
      - id: check-changelog-test-counts
        name: check CHANGELOG test counts
        entry: python scripts/check-changelog-test-counts.py
        language: python
        files: ^CHANGELOG\.md$
        pass_filenames: false

  # ADR status/version-line consistency — catches the drift class #1492
  # reconciled by hand (Accepted ADR still has a `Target version:` line).
  # See scripts/check-adr-status.py and tests/test_check_adr_status.py.
  # Closes #1501.
  - repo: local
    hooks:
      - id: check-adr-status
        name: check ADR status/version-line consistency (#1501)
        entry: python scripts/check-adr-status.py
        language: python
        files: ^docs/adr/.*\.md$
        pass_filenames: false

  # Doc-snippet smoke test + claim assertions — catches doc-rot in fenced
  # Python snippets (syntax/phantom-import) and the Django-floor / JS
  # bundle-size claims in README/QUICKSTART, plus symbol/import resolvability
  # in docs/website/guides/*.md (#1707 — the guard for #1559/#1699's
  # hallucinated djust.tenants symbols). See scripts/check-doc-snippets.py
  # and tests/test_check_doc_snippets.py. Closes #1500 (parts a+b), #1707.
  - repo: local
    hooks:
      - id: check-doc-snippets
        name: check doc snippets + version/size claims (#1500, #1707)
        entry: bash -c 'PYTHONPATH=. bash scripts/run-with-venv-python.sh scripts/check-doc-snippets.py'
        language: system
        files: ^(README|QUICKSTART)\.md$|^pyproject\.toml$|^docs/website/guides/.*\.md$
        pass_filenames: false

  # Lockfile self-entry version sync — catches the drift class #1487 cited
  # (`make version` bumps the manifests but a lockfile self-entry stays
  # pinned at the old version). Scoped to manifests/lockfiles so a routine
  # third-party `uv add` does not trigger it. See
  # scripts/check-lockfile-versions.py and
  # tests/test_check_lockfile_versions.py. Closes #1498.
  - repo: local
    hooks:
      - id: check-lockfile-versions
        name: check lockfile self-entry version sync (#1498)
        entry: python scripts/check-lockfile-versions.py
        language: python
        files: ^(pyproject\.toml|Cargo\.toml|uv\.lock|Cargo\.lock)$
        pass_filenames: false

  # Pre-push hooks (slower checks that run before git push)
  - repo: local
    hooks:
      # Python tests
      # PREPEND the current worktree's python/ to PYTHONPATH so a worktree
      # push tests the worktree's source, not the MAIN checkout's (the editable
      # `djust.pth` points at the main tree). `--worktree-pythonpath` emits the
      # path to prepend (empty in the main checkout) and symlinks the matching
      # compiled `.so` so `import djust._rust` keeps working. See #1810.
      - id: pytest
        name: pytest
        entry: bash -c 'WT="$(bash scripts/run-with-venv-python.sh --worktree-pythonpath)"; PYTHONPATH="${WT:+$WT:}." bash scripts/run-with-venv-python.sh -m pytest tests/ python/tests/ -q'
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      # Rust tests
      - id: cargo-test
        name: cargo test
        entry: bash -c 'PYO3_PYTHON="$(bash scripts/run-with-venv-python.sh --print)" cargo test --workspace --exclude djust_live --release -q'
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      # Rust dependency audit
      - id: cargo-audit
        name: cargo audit
        entry: cargo audit
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      # Flag new `# noqa: F822` annotations in __all__ (Action #146)
      # Ruff silences py/undefined-export but CodeQL flags it; prefer
      # TYPE_CHECKING-conditional imports (PR #924 pattern). See
      # scripts/check-noqa-f822.sh for rationale + override path.
      - id: check-noqa-f822
        name: check noqa F822
        entry: bash scripts/check-noqa-f822.sh
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      # Sweep docs/**/*.md for stale cross-references (#1075)
      # Pairs with `make docs-lint` for manual / CI invocation.
      - id: docs-lint
        name: docs stale-MD-ref check
        entry: bash -c 'PYTHONPATH=. bash scripts/run-with-venv-python.sh scripts/docs-lint.py'
        language: system
        files: ^docs/.*\.md$
        pass_filenames: false
        stages: [pre-push]

      # Flag newly-added private methods with zero callers anywhere (#1209).
      # Prevents the dead-code-misleads-investigator failure mode that
      # produced `_lazy_serialize_context` (PR #1206 / #1205). Pre-existing
      # dead methods are intentionally NOT flagged — only methods added
      # in the current branch (vs origin/main). Escape hatch: annotate
      # the def line with `# noqa: dead-method-allowed`.
      - id: check-no-dead-private-methods
        name: check no dead private methods
        entry: bash -c 'bash scripts/run-with-venv-python.sh scripts/check-no-dead-private-methods.py'
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      # Flag bare comma-list ``Closes #X, #Y`` in branch commit messages (#1227).
      # GitHub's auto-close parser only matches a closing keyword when it
      # precedes EACH ref — comma-list shape closes only the FIRST issue.
      # PR #1225 + PR #1226 both bit this in 24 hours; the fix is structural.
      - id: check-no-comma-list-closes
        name: check no comma-list Closes
        entry: bash -c 'bash scripts/run-with-venv-python.sh scripts/check-no-comma-list-closes.py'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      # Cross-reference tag-emit _event defaults against component/mixin
      # handler methods. Catches #1275-class (stale/typo'd emit default)
      # bugs before they reach CI (#1290).
      - id: check-handler-contracts
        name: check handler contracts
        entry: bash -c 'bash scripts/run-with-venv-python.sh scripts/check-handler-contracts.py'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
