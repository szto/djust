# components/ FINAL batch (ADR-023 M4b, part 3) — the LAST remaining
# components/ modules: the component template-tag layer
# (djust_components/_advanced/_forms/_charts), the per-widget data_table mixin,
# the gallery LiveView/view/registry/examples surface + its management command,
# the ~24 remaining components/components/ widgets, the layout/data/ttyd leaves,
# and the union-typed `ui/*_simple` + ui/dropdown stateless widgets. The large
# Rust-bridge handler registry (rust_handlers) is intentionally left LENIENT — it
# is a genuinely-dynamic registry whose handlers parse untyped Rust-engine arg
# lists into object-valued dicts (kw.get()->object cascades), so strict typing
# would require >200 narrowing changes / type: ignores with real rendering-behavior
# risk; the global lenient default is the correct home for it (documented exception).
[[tool.mypy.overrides]]
module = [
    "djust.components.components.animated_number",
    "djust.components.components.breadcrumb_dropdown",
    "djust.components.components.button",
    "djust.components.components.calendar_view",
    "djust.components.components.comparison_table",
    "djust.components.components.currency_input",
    "djust.components.components.dependent_select",
    "djust.components.components.diff_viewer",
