# components/rust_handlers (ADR-023 M4g, ratchet COMPLETE) — the Rust template-
# engine component tag-registration shim: ~193 `render()` handlers (inline +
# block) that parse untyped Rust-engine arg lists (`["key=val", ...]`) into
# object-valued dicts and emit component HTML. This was the SOLE remaining
# lenient module (the genuinely-dynamic Rust-FFI boundary). It is now strict:
# - All 193 handler returns are pinned via a typed `_safe()` wrapper that casts
#   Django's `@keep_lazy`-decorated (untyped -> Any) `mark_safe` to `str`,
#   absorbing the no-any-return cascade WITHOUT any `# type: ignore`.
# - The `kw.get(...) -> object` cascades are narrowed with inline `cast(...)` /
#   `str(...)` (runtime no-ops) at each `int()`/`float()`/dict-key/attr site.
# Zero new `# type: ignore` were needed (the only one is the pre-existing
# `_rust` `[import]`). Render output is proven byte-identical (382 outputs across
# all 193 handlers). Flipping this module retires the last ADR-023 lenient
# exception — the global lenient default now parks only legacy non-components
# modules.
[[tool.mypy.overrides]]
module = [
    "djust.components.rust_handlers",
]
ignore_errors = false
disallow_untyped_defs = true
disallow_incomplete_defs = true
