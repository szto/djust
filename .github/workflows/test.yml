name: Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG.md'

# Cancel superseded runs when commits push rapidly to a branch or PR.
# Force-pushes, dependabot rebases, and quick fixup commits otherwise burn
# the full ~30 compute-min suite on every intermediate revision. Mirrors
# the block in codeql.yml (which has had this since #1340).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Rust tests - runs in parallel
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      # Swatinem/rust-cache keys on rustc version + Cargo.lock + the job
      # context (so rust-tests and python-tests don't poison each other's
      # caches — python-tests builds the PyO3 cdylib, rust-tests builds
      # the workspace libs). Already in use in release.yml:102. Previously
      # this was a hand-rolled actions/cache keyed only on Cargo.lock,
      # which suffered cache misses on rustc bumps and dependency changes.
      - uses: Swatinem/rust-cache@v2

      - name: Set up Python (for PyO3)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Python dependencies (for PyO3)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-python-minimal-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-python-minimal-
            ${{ runner.os }}-python-

      - name: Install minimal Python deps (for PyO3)
        run: uv sync --no-dev

      - name: Run Rust tests
        run: |
          export PYO3_PYTHON=$(pwd)/.venv/bin/python
          # Phase 1: workspace except djust_live (cdylib link constraint).
          cargo test --workspace --exclude djust_live --release
          # Phase 2: djust_live with extension-module gated off (#1543) so
          # the actor / msgpack / wire-protocol tests in djust_live get
          # genuine Rust-test coverage (not just compile-checks).
          cargo test -p djust_live --no-default-features --release

      - name: Run Rust linter
        run: |
          export PYO3_PYTHON=$(pwd)/.venv/bin/python
          cargo clippy -- -W clippy::all -D clippy::correctness -D clippy::suspicious

      - name: Check Rust formatting
        run: cargo fmt --check

  # Python tests - runs in parallel with pytest-xdist
  #
  # Matrix-on-PR is the project's #1 minute sink (3 cells × ~10 min each).
  # On PR we run only the canonical interpreter (3.12); on push to main
  # we run the full matrix (3.12/3.13/3.14). 3.13 / 3.14 regressions are
  # caught on the merge commit instead of at PR time — one merge later,
  # not "never". Historical evidence the matrix has value: PRs #450 / #452
  # shipped real 3.14-support fixes. Tradeoff accepted because the absolute
  # cost (~8 min/PR × dependabot volume) outweighed the latency.
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ github.event_name == 'push' && fromJSON('["3.12","3.13","3.14"]') || fromJSON('["3.12"]') }}
    name: python-tests (py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # Matrix-aware: Swatinem/rust-cache automatically scopes the cache
      # to the python-version matrix dimension, so 3.12 / 3.13 / 3.14
      # builds keep separate caches and don't invalidate each other.
      - uses: Swatinem/rust-cache@v2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: '${{ matrix.python-version }}'
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-python-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install Python dependencies and build extension
        run: |
          uv sync --extra dev
          uv run maturin develop --release

      - name: Install test tools
        run: uv pip install pytest-xdist mypy

      - name: Run Python tests (parallel with pytest-xdist)
        run: |
          PYTHONPATH=. .venv/bin/python -m pytest tests/ python/tests/ -v -n auto

      - name: Run Python linter
        run: uv run ruff check python/

      - name: ADR status/version-line consistency (#1501)
        run: .venv/bin/python scripts/check-adr-status.py

      - name: Doc-snippet smoke test + claim assertions (#1500, #1707)
        # Also scans docs/website/guides/*.md for symbol/import resolvability
        # (#1707) — the guard for #1559/#1699's hallucinated djust.tenants
        # symbols. Guides are scanned by default; --no-guides disables.
        run: .venv/bin/python scripts/check-doc-snippets.py

      - name: Lockfile self-entry version sync (#1498)
        run: .venv/bin/python scripts/check-lockfile-versions.py

  # Free-threaded (no-GIL) smoke leg - #1534 / follow-up to #1432.
  # Targeted, NOT a full suite run: a 3.14t runner can hit unrelated
  # free-threaded-ecosystem gaps. continue-on-error keeps it non-blocking
  # until it has soaked; promote to blocking in a follow-up once green.
  # NOT wired into the test-summary aggregate gate.
  python-free-threaded:
    runs-on: ubuntu-latest
    continue-on-error: true
    name: python-tests (py3.14t free-threaded)
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install free-threaded Python 3.14t
        run: uv python install 3.14t

      - name: Build extension + install test deps (3.14t)
        run: |
          # The [dev] extra pulls orjson, which has no free-threaded build
          # yet (orjson upstream does not support free-threaded Python).
          # orjson is optional for djust at runtime (find_spec + stdlib json
          # fallback), so install only djust core (via maturin develop, which
          # builds the extension and installs the package + its core deps)
          # plus the test runner -- never the full [dev] extra.
          # NOTE: do not use `uv run` here -- it re-manages the project env
          # from pyproject.toml with the default interpreter and would wipe
          # this hand-built 3.14t venv. Activate the venv and call tools
          # directly instead.
          uv venv --python 3.14t
          source .venv/bin/activate
          uv pip install maturin pytest pytest-asyncio
          maturin develop --release

      - name: Free-threaded smoke test (no-GIL assertion)
        run: |
          source .venv/bin/activate
          python -m pytest \
            python/djust/tests/test_rust_module_thread_safety.py -v

  # JavaScript tests - runs in parallel
  javascript-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Bundle init-order static lint (#1372)
        run: node scripts/check-bundle-init-order.mjs

      - name: Bundle cross-IIFE bare-reference static guard (#1706)
        run: node scripts/check-cross-iife-refs.mjs

      - name: Run JavaScript tests
        run: npm test

      - name: Run JavaScript linter (if configured)
        run: |
          if [ -f "package.json" ] && grep -q "lint" package.json; then
            npm run lint || echo "No lint script found, skipping"
          fi

  # Playwright browser tests - runs in parallel (optional, doesn't block CI)
  playwright-tests:
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail CI on Playwright test failures
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-python-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Install Playwright
        run: |
          uv pip install playwright
          .venv/bin/playwright install chromium

      - name: Run Django migrations
        run: |
          cd examples/demo_project
          uv run python manage.py migrate --noinput
          cd ../..

      # Dogfood djust_check against the demo project (#1708, enforces
      # CLAUDE.md #1060). #1683 shipped dead @click buttons to 1.0 GA because
      # the demo templates were never run through djust_check in CI.
      #
      # The helper wraps `manage.py djust_check --json` (which itself always
      # exits 0) and sets a real exit code. It fails ONLY on error-severity
      # checks and the deprecated-attribute classes T001/T014/T015 (the exact
      # #1683 bug class) — NOT on the demo's intentional warnings (public-view
      # auth notices, partial-fragment templates).
      #
      # NOTE: this step inherits the job's `continue-on-error: true`, so it is
      # NON-BLOCKING on its first runner iterations (rc4 retro finding #3: a new
      # CI check exercising an env the dev machine can't fully mirror needs >=1
      # runner-only iteration budgeted). Once it has shipped green on the
      # runner, promote it to a blocking gate — either move it to a dedicated
      # `demo-checks` job without continue-on-error, or wire it into the
      # test-summary aggregate gate.
      - name: Dogfood djust_check against the demo (non-blocking until green)
        run: |
          cd examples/demo_project
          PYTHONPATH=../.. uv run python ../../scripts/ci_djust_check_demo.py
          cd ../..
        env:
          PYTHONPATH: .

      - name: Start development server
        run: |
          cd examples/demo_project
          nohup uv run python -m uvicorn demo_project.asgi:application \
            --host 0.0.0.0 \
            --port 8002 \
            --log-level info \
            > server.log 2>&1 &
          echo $! > server.pid
          cd ../..
        env:
          PYTHONPATH: .

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8002/ > /dev/null; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Attempt $i/30: Server not ready yet..."
            sleep 1
          done
          echo "Server failed to start"
          cat examples/demo_project/server.log
          exit 1

      - name: Run Playwright tests
        run: |
          echo "Running @loading attribute tests..."
          .venv/bin/python tests/playwright/test_loading_attribute.py
          echo "Running @cache decorator tests..."
          .venv/bin/python tests/playwright/test_cache_decorator.py
          echo "Running DraftMode tests..."
          .venv/bin/python tests/playwright/test_draft_mode.py

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-server-logs
          path: examples/demo_project/server.log

      - name: Stop server
        if: always()
        run: |
          if [ -f examples/demo_project/server.pid ]; then
            kill $(cat examples/demo_project/server.pid) || true
            rm examples/demo_project/server.pid
          fi

  # Security scanning job — bandit + safety + cargo-audit + npm-audit.
  # Runs on push to main, schedule, and manual dispatch; SKIPPED on PRs.
  #
  # Rationale: this job duplicates the heavier audit that
  # ``pre-release-security-audit.yml`` runs on every tag push — at PR time
  # it was the single longest job in the workflow (~8 min observed) and
  # produced findings ``security-tests`` (pytest-cov) had already gated.
  # Keeping it on push-to-main catches main-branch regressions in
  # security-relevant dependencies the moment they land, without paying
  # the cost on every dependabot rebase / fixup commit.
  #
  # ``security-tests`` (further down) stays on the PR path — it is the
  # pytest-cov leg with the ``--cov-fail-under=75`` gate, which is a real
  # PR-time signal we don't want to drop.
  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-python-security-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-security-
            ${{ runner.os }}-python-

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Install security tools
        run: |
          uv pip install bandit safety

      - name: Run Bandit (Python security linter)
        run: |
          # Skip expected patterns: B703/B308 (mark_safe), B324 (MD5 cache keys),
          # B301 (pickle for JIT), B102 (exec for JIT codegen)
          uv run bandit -r python/djust/ -ll -ii -x python/djust/tests/ -s B703,B308,B324,B301,B102

      - name: Run Safety (Python dependency vulnerabilities)
        run: |
          uv run safety check --full-report || echo "Safety check completed with warnings"
        continue-on-error: true

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo-audit
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-0.21

      - name: Install cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit

      - name: Run cargo-audit (Rust dependency vulnerabilities)
        run: cargo audit || echo "Cargo audit completed with warnings"
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run npm audit (JS dependency vulnerabilities)
        run: npm audit --audit-level=high || echo "NPM audit completed with warnings"
        continue-on-error: true

      - name: Run ESLint with security plugin
        run: npm run lint || echo "ESLint completed with warnings"
        continue-on-error: true

  # Security tests with coverage - runs in parallel
  security-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-python-security-tests-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-security-tests-
            ${{ runner.os }}-python-

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Install coverage tools
        run: uv pip install pytest-cov

      - name: Run security tests with coverage
        run: |
          PYTHONPATH=. .venv/bin/python -m pytest \
            tests/unit/test_security_*.py \
            tests/unit/test_upload_writer.py \
            python/tests/test_security*.py \
            -v \
            --cov=djust.security \
            --cov=djust.uploads \
            --cov=djust.validation \
            --cov-report=term-missing \
            --cov-report=json:coverage-security.json \
            --cov-fail-under=75

      - name: Upload security coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-coverage-report
          path: coverage-security.json

  # Summary job - waits for all test jobs
  test-summary:
    runs-on: ubuntu-latest
    needs: [rust-tests, python-tests, javascript-tests, playwright-tests, security-scan, security-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "Test Results Summary:"
          echo "  Rust tests: ${{ needs.rust-tests.result }}"
          echo "  Python tests: ${{ needs.python-tests.result }}"
          echo "  JavaScript tests: ${{ needs.javascript-tests.result }}"
          echo "  Playwright tests: ${{ needs.playwright-tests.result }} (optional)"
          echo "  Security scan: ${{ needs.security-scan.result }}"
          echo "  Security tests: ${{ needs.security-tests.result }}"

          # Core tests must pass (Rust, Python, JavaScript, Security tests)
          # Playwright tests and security scan are informational (not blocking)
          if [ "${{ needs.rust-tests.result }}" == "success" ] && \
             [ "${{ needs.python-tests.result }}" == "success" ] && \
             [ "${{ needs.javascript-tests.result }}" == "success" ] && \
             [ "${{ needs.security-tests.result }}" == "success" ]; then
            echo "All core tests passed!"
            if [ "${{ needs.playwright-tests.result }}" != "success" ]; then
              echo "WARNING: Playwright tests failed (optional, not blocking)"
            fi
            # ``skipped`` is the expected result on PR runs (security-scan
            # is push/schedule/dispatch only) — only warn on a true failure.
            if [ "${{ needs.security-scan.result }}" != "success" ] && \
               [ "${{ needs.security-scan.result }}" != "skipped" ]; then
              echo "WARNING: Security scan had warnings (review recommended)"
            fi
            exit 0
          else
            echo "FAILURE: Some core tests failed"
            exit 1
          fi
