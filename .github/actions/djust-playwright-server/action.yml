name: 'djust Playwright server'
description: >-
  Set up Python + uv, build the djust Rust extension, install Playwright
  (chromium), run Django migrations, and start the demo project's dev server
  on :8002, waiting until it answers. Shared by the playwright-tests and
  nav-hooks-guard jobs (#1752). The caller must `actions/checkout` first
  (this is a local action) and is responsible for running its own test step,
  uploading server.log on failure, and stopping the server.

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Cache Python dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-python-playwright-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-python-playwright-
          ${{ runner.os }}-python-

    - name: Install Python dependencies
      shell: bash
      run: uv sync --extra dev

    - name: Build package
      # Force a fresh Rust-extension build so render-behavior guards never test a
      # stale cached extension. The uv/.venv cache key is keyed on
      # pyproject.toml/uv.lock only, so a crates/*.rs-only change would otherwise
      # restore a previously-built djust. (#1752)
      shell: bash
      run: uv run maturin develop --release

    - name: Install Playwright
      shell: bash
      run: |
        uv pip install playwright
        .venv/bin/playwright install chromium

    - name: Run Django migrations
      shell: bash
      run: |
        cd examples/demo_project
        uv run python manage.py migrate --noinput
        cd ../..

    - name: Start development server
      shell: bash
      env:
        PYTHONPATH: .
      run: |
        cd examples/demo_project
        nohup uv run python -m uvicorn demo_project.asgi:application \
          --host 0.0.0.0 \
          --port 8002 \
          --log-level info \
          > server.log 2>&1 &
        echo $! > server.pid
        cd ../..

    - name: Wait for server to be ready
      shell: bash
      # Readiness poll (#1943). The fixed 30s `page.goto` deadline in the
      # playwright tests intermittently red-barred the BLOCKING browser-smoke
      # gate (#1869) on cold-cache CI runs: when the `djust_components` Rust
      # crate compiles from scratch the first request to the demo route is
      # slow, so the server wasn't ready when playwright connected.
      #
      # Two changes remove that cold-start race while keeping the gate's signal
      # intact (a genuinely-broken server still fails LOUD — see below):
      #
      #   1. Bound bumped 30s -> 120s (60 attempts x 2s). Cold-cache cannot
      #      exceed this; a real break still fails (exit 1 + server.log dump)
      #      once the bound is hit, so the gate still red-bars a true failure.
      #   2. Poll the ACTUAL canary target route (/demos/browser-smoke/), not
      #      just `/`. A 200 on `/` does NOT prove `/demos/browser-smoke/` (a
      #      different LiveView under djust_demos.urls) is ready — its FIRST
      #      request is what triggers any first-hit lazy import / compilation.
      #      Polling it here warms that route DURING the bounded loop, so
      #      playwright's `page.goto` lands on an already-warm route instead of
      #      racing its own fixed deadline.
      #
      # `curl -fsS` returns non-zero on any HTTP status >= 400, so a 500 from a
      # half-initialized app does NOT count as ready — we keep polling until a
      # real success or the bound. A broken route is never marked ready.
      run: |
        echo "Waiting for demo server + /demos/browser-smoke/ route (bound: 120s = 60 x 2s)..."
        ready=0
        for i in $(seq 1 60); do
          # Require BOTH the root and the canary target route to answer with a
          # successful (2xx/3xx) HTTP response. -f => fail on >= 400; -sS =>
          # silent but show errors; -o /dev/null => discard body.
          if curl -fsS -o /dev/null http://localhost:8002/ \
             && curl -fsS -o /dev/null http://localhost:8002/demos/browser-smoke/; then
            echo "Server + /demos/browser-smoke/ route are ready (attempt $i)!"
            ready=1
            break
          fi
          echo "Attempt $i/60: server or /demos/browser-smoke/ not ready yet..."
          sleep 2
        done
        if [ "$ready" -ne 1 ]; then
          echo "Server failed to become ready within 120s (60 attempts x 2s)."
          echo "===== examples/demo_project/server.log ====="
          cat examples/demo_project/server.log || true
          exit 1
        fi
