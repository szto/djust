name: "djust CodeQL config"

# Extension packs — teach CodeQL about djust-specific sanitizers/sinks.
# Path is resolved relative to the repository root. See
# .github/codeql/models/djust-sanitizers.model.yml (closes #934).
packs:
  - .github/codeql/models

paths-ignore:
  # JS source fragments — concatenated into client.js/debug-panel.js at build time.
  # CodeQL cannot parse fragments individually (unclosed blocks, class method bodies).
  # Analyze the built client.js and debug-panel.js instead.
  - "python/djust/static/djust/src/**"
  # Test fixtures and examples are not production code
  - "python/djust/tests/**"
  - "python/tests/**"
  - "tests/**"
  - "examples/**"

query-filters:
  # Exclude specific rules that produce false positives on djust's client JS.
  # The framework uses innerHTML for trusted server-rendered VDOM HTML,
  # DOM property assignments for form field sync, and debug logging with
  # server-controlled data. Security is enforced server-side by the
  # Django/Rust template engine. Actual code guards (UNSAFE_KEYS, String()
  # coercion, Object.defineProperty, format strings) remain as defense in depth.
  - exclude:
      id: js/xss
  - exclude:
      id: js/prototype-polluting-assignment
  - exclude:
      id: js/remote-property-injection
  - exclude:
      id: js/log-injection
  # py/ineffectual-statement fires on the ``...`` Ellipsis body of the
  # ``if TYPE_CHECKING:`` forward-declaration stubs that the ADR-023 strict-mypy
  # ratchet added across the mixins (cooperating-attribute/method declarations so
  # each strict-island mixin resolves names supplied by sibling classes at MRO
  # time — zero runtime effect; see ``python/djust/mixins/*.py`` + ``streaming.py``).
  # All 50 hits are this idiom; the genuine useless-expression class is covered by
  # ruff. Excluded repo-wide as pure false-positive noise.
  - exclude:
      id: py/ineffectual-statement
